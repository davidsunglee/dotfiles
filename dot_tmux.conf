set-option -g default-shell /bin/zsh

# Toggle status bar visibility with <prefix> + b
bind b set -g status

# Hide status bar by default
set -g status off

# Options to make tmux more pleasant
set -g mouse on
set -g extended-keys on
set -g extended-keys-format csi-u
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,xterm-ghostty:Tc"
set -ga terminal-features 'xterm-ghostty:extkeys'

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha" # latte, frappe, macchiato, or mocha
set -g @catppuccin_window_status_style "slanted" # basic, rounded, slanted, custom, or none

# Load catppuccin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Make the status line pretty and add some modules
set -g status-right-length 80
set -g status-left-length 80
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_application}"

